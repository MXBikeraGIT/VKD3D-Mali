name: Build vkd3d-proton v2.14.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vkd3d:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Source
        run: |
          # Use git clone --recursive to pull the repo AND all submodules
          git clone --recursive --branch v2.14.1 https://github.com/HansKristian-Work/vkd3d-proton.git $GITHUB_WORKSPACE/source

      - name: Apply Patches
        run: |
          sed -i '/descriptor_write_count += 2;/a if (descriptor_write_count) { if (list->device->vk_info.KHR_push_descriptor) { VK_CALL(vkCmdPushDescriptorSetKHR(list->cmd.vk_command_buffer, vk_bind_point, layout, root_signature->root_descriptor_set, descriptor_write_count, descriptor_writes)); } }' $GITHUB_WORKSPACE/source/libs/vkd3d/command.c
          sed -i '/return VKD3D_ERROR_NOT_SUPPORTED;/d' $GITHUB_WORKSPACE/source/libs/vkd3d/device.c

      - name: Build
        uses: misyltoad/arch-mingw-github-action@v8
        with:
          command: |
            mkdir -p $GITHUB_WORKSPACE/build
            
            # Setup Meson
            meson setup \
              $GITHUB_WORKSPACE/build \
              $GITHUB_WORKSPACE/source \
              --cross-file $GITHUB_WORKSPACE/source/build-win64.txt \
              --buildtype release
            
            # Compile
            ninja -C $GITHUB_WORKSPACE/build

      - name: Package
        run: |
          mkdir -p $GITHUB_WORKSPACE/package/x64
          
          # Copy binaries
          cp $GITHUB_WORKSPACE/build/d3d12.dll $GITHUB_WORKSPACE/package/x64/ || true
          cp $GITHUB_WORKSPACE/build/d3d12core.dll $GITHUB_WORKSPACE/package/x64/ || true
          
          # Create profile.json
          cat <<EOF > $GITHUB_WORKSPACE/package/profile.json
          {
            "type": "VKD3D",
            "versionName": "2.14.1",
            "versionCode": 2,
            "description": "VKD3D v2.14.1 for Mali",
            "files": [
              { "source": "x64/d3d12.dll", "target": "\${system32}/d3d12.dll" },
              { "source": "x64/d3d12core.dll", "target": "\${system32}/d3d12core.dll" }
            ]
          }
          EOF
          
          cd $GITHUB_WORKSPACE/package
          tar -cvf VKD3D-Mali.tar .
          xz VKD3D-Mali.tar
          mv VKD3D-Mali.tar.xz $GITHUB_WORKSPACE/VKD3D-Mali.wcp.xz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VKD3D-Mali
          path: VKD3D-Mali.wcp.xz
          if-no-files-found: error
