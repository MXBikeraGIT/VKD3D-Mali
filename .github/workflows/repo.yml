name: Build vkd3d-proton v2.14.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vkd3d:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Build Environment
        run: |
          wget https://github.com/HansKristian-Work/vkd3d-proton/archive/refs/tags/v2.14.1.zip
          unzip v2.14.1.zip
          mv vkd3d-proton-2.14.1 source

      - name: Apply Patches
        run: |
          sed -i '/descriptor_write_count += 2;/a if (descriptor_write_count) { if (list->device->vk_info.KHR_push_descriptor) { VK_CALL(vkCmdPushDescriptorSetKHR(list->cmd.vk_command_buffer, vk_bind_point, layout, root_signature->root_descriptor_set, descriptor_write_count, descriptor_writes)); } }' source/libs/vkd3d/command.c
          sed -i '/return VKD3D_ERROR_NOT_SUPPORTED;/d' source/libs/vkd3d/device.c

         - name: Build
        uses: misyltoad/arch-mingw-github-action@v8
        with:
          command: |
            cd source
            meson setup build --cross-file build-win64.conf -Denable_extended_emulation=true --buildtype release
            ninja -C build

      - name: Package
        run: |
          mkdir -p package/x64
          mkdir -p package/x32
          
          # Copy from the build directory inside source
          cp source/build/d3d12.dll package/x64/ || true
          cp source/build/d3d12core.dll package/x64/ || true
          # Note: If vkd3d-proton produces x86/x64 subfolders, adjust accordingly:
          # cp source/build/x64/d3d12.dll package/x64/ || true
          
          cat <<EOF > package/profile.json
          {
            "type": "VKD3D",
            "versionName": "2.14.1",
            "versionCode": 2,
            "description": "VKD3D v2.14.1 for Mali",
            "files": [
              { "source": "x64/d3d12.dll", "target": "\${system32}/d3d12.dll" },
              { "source": "x64/d3d12core.dll", "target": "\${system32}/d3d12core.dll" }
            ]
          }
          EOF
          
          tar -cvf VKD3D-Mali.tar -C package .
          xz VKD3D-Mali.tar
          mv VKD3D-Mali.tar.xz VKD3D-Mali.wcp.xz
