name: Build vkd3d-proton v2.14.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vkd3d:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Source
        run: |
          wget https://github.com/HansKristian-Work/vkd3d-proton/archive/refs/tags/v2.14.1.zip
          unzip v2.14.1.zip
          mv vkd3d-proton-2.14.1 source

      - name: Apply Patches
        run: |
          sed -i '/descriptor_write_count += 2;/a if (descriptor_write_count) { if (list->device->vk_info.KHR_push_descriptor) { VK_CALL(vkCmdPushDescriptorSetKHR(list->cmd.vk_command_buffer, vk_bind_point, layout, root_signature->root_descriptor_set, descriptor_write_count, descriptor_writes)); } }' source/libs/vkd3d/command.c
          sed -i '/return VKD3D_ERROR_NOT_SUPPORTED;/d' source/libs/vkd3d/device.c

      - name: Build release
        uses: misyltoad/arch-mingw-github-action@v8
        with:
          command: |
            cd source
            ./package-release.sh v2.14.1 build --no-package

      - name: Package
        run: |
          mkdir -p package/x64
          mkdir -p package/x32
          
          cp source/build/vkd3d-proton-*/x64/d3d12.dll package/x64/ || true
          cp source/build/vkd3d-proton-*/x64/d3d12core.dll package/x64/ || true
          cp source/build/vkd3d-proton-*/x86/d3d12.dll package/x32/ || true
          cp source/build/vkd3d-proton-*/x86/d3d12core.dll package/x32/ || true
          
          cat <<EOF > package/profile.json
          {
            "type": "VKD3D",
            "versionName": "2.14.1",
            "versionCode": 2,
            "description": "VKD3D v2.14.1 for Mali",
            "files": [
              { "source": "x64/d3d12.dll", "target": "\${system32}/d3d12.dll" },
              { "source": "x64/d3d12core.dll", "target": "\${system32}/d3d12core.dll" },
              { "source": "x32/d3d12.dll", "target": "\${syswow64}/d3d12.dll" },
              { "source": "x32/d3d12core.dll", "target": "\${syswow64}/d3d12core.dll" }
            ]
          }
          EOF
          
          tar -cvf VKD3D-Mali.tar -C package .
          xz VKD3D-Mali.tar
          mv VKD3D-Mali.tar.xz VKD3D-Mali.wcp.xz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VKD3D-Mali
          path: VKD3D-Mali.wcp.xz
          if-no-files-found: error
